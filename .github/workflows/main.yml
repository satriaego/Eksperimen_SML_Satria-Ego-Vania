name: Otomatisasi Preprocessing Data
run-name: 'Preprocessing Otomatis [Trigger: ${{ github.event_name }}]'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas

    - name: Jalankan Preprocessing Otomatis dari File Script
      run: |
        import sys
        import os
        
        sys.path.append(os.path.abspath('preprocessing'))
        
        target_script = __import__('automate_Satria-Ego-Vania')
        
        df_clean = target_script.preprocess_titanic_data('Titanic dataset_raw.csv')
        
        df_clean.to_csv('preprocessing/Titanic_cleaned_latest.csv', index=False)
        print('Selesai')
      shell: python

    - name: Commit dan Push Dataset Terbaru ke Repo
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        
        git add preprocessing/Titanic_cleaned_latest.csv
        
        git commit -m "Update otomatis dataset hasil preprocessing [Skip CI]" || exit 0
        git push
